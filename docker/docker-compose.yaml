version: '3.8'

services:
  # 1. The Metadata Database
  postgres:
    image: postgres:13
    environment:
      - POSTGRES_USER=airflow
      - POSTGRES_PASSWORD=airflow
      - POSTGRES_DB=airflow
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # 2. The Local Data Lake
  minio:
    image: minio/minio
    container_name: docker-minio-1
    command: server /data --console-address ":9001"
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
    ports:
      - "9002:9000"
      - "9003:9001"
    volumes:
      - ../data:/data

  # 3. The Orchestrator (Webserver)
  airflow-webserver:
    build: .
    command: webserver
    ports:
      - "8081:8080"
    environment:
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://airflow:airflow@postgres/airflow
      - AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION=true
      - AIRFLOW__CORE__LOAD_EXAMPLES=false
      - AIRFLOW__WEBSERVER__SECRET_KEY=this_is_a_very_secure_key_for_local_dev
      - AWS_ACCESS_KEY_ID=minioadmin
      - AWS_SECRET_ACCESS_KEY=minioadmin
      - AWS_DEFAULT_REGION=us-east-1
    volumes:
      - ../dags:/opt/airflow/dags
      - ../dbt_project:/opt/airflow/dbt_project
      - ../data:/opt/airflow/data
      - ../logs:/opt/airflow/logs
    depends_on:
      - postgres
      - minio

  # 4. The Scheduler
  airflow-scheduler:
    build: .
    command: scheduler
    environment:
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://airflow:airflow@postgres/airflow
      - AIRFLOW__CORE__LOAD_EXAMPLES=false
      - AIRFLOW__WEBSERVER__SECRET_KEY=this_is_a_very_secure_key_for_local_dev
      - AWS_ACCESS_KEY_ID=minioadmin
      - AWS_SECRET_ACCESS_KEY=minioadmin
    volumes: 
      - ../dags:/opt/airflow/dags
      - ../dbt_project:/opt/airflow/dbt_project
      - ../data:/opt/airflow/data
      - ../logs:/opt/airflow/logs
    depends_on:
      - postgres
      - minio

  # 5. The Visualization Tool (Metabase) - NEW!
  metabase:
    image: metabase/metabase:latest
    container_name: docker-metabase
    restart: always
    ports:
      - "3000:3000"
    volumes:
      - metabase_data:/metabase.db

volumes:
  postgres_data:
  metabase_data: # <--- Stores your charts so they don't vanish on restart
