version: '3.8'

services:
  postgres:
    image: postgres:13
    container_name: airflow-postgres
    environment:
      - POSTGRES_USER=airflow
      - POSTGRES_PASSWORD=airflow
      - POSTGRES_DB=airflow
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  minio:
    image: minio/minio
    container_name: docker-minio-1
    command: server /data --console-address ":9001" --address "0.0.0.0:9000"
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
      - MINIO_DISK_USAGE_FATAL_THRESHOLD=99
    ports:
      - "9002:9000"
      - "9003:9001"
    volumes:
      - ../data:/data

  airflow-webserver:
    build: 
      context: ..
      dockerfile: docker/Dockerfile
    container_name: airflow-webserver
    command: webserver
    ports:
      - "8085:8080"
    environment:
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://airflow:airflow@postgres/airflow
      - AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION=true
      - AIRFLOW__CORE__LOAD_EXAMPLES=false
      - AIRFLOW__WEBSERVER__SECRET_KEY=this_is_a_very_secure_key_for_local_dev
      - AIRFLOW__METRICS__PROMETHEUS_EXPORT_ENABLED=true
    volumes:
      - ../dags:/opt/airflow/dags
      - ../dbt_project:/opt/airflow/dbt_project
      - ../data:/opt/airflow/data
      - ../logs:/opt/airflow/logs
    depends_on:
      - postgres
      - minio

  airflow-scheduler:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: airflow-scheduler
    command: scheduler
    environment:
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://airflow:airflow@postgres/airflow
      - AIRFLOW__CORE__LOAD_EXAMPLES=false
    volumes: 
      - ../dags:/opt/airflow/dags
      - ../dbt_project:/opt/airflow/dbt_project
      - ../data:/opt/airflow/data
      - ../logs:/opt/airflow/logs
    depends_on:
      - postgres
      - minio

  metabase:
    image: metabase/metabase:latest
    container_name: docker-metabase
    restart: always
    ports:
      - "3005:3000" # Using 3005 to avoid any potential 3000 conflicts with Grafana
    volumes:
      - metabase_data:/metabase.db

volumes:
  postgres_data:
  metabase_data:
