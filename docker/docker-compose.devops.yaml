version: '3.8'

services:
  # 1. CI/CD Orchestrator
  jenkins:
    image: jenkins/jenkins:lts
    container_name: devops-jenkins
    privileged: true
    user: root
    ports:
      - "8080:8080"
      - "50000:50000"
    volumes:
      - jenkins_data:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock # Allows Jenkins to run Docker commands

  # 2. Monitoring - Metrics Collector
  prometheus:
    image: prom/prometheus:latest
    container_name: devops-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml

  # 3. Monitoring - Dashboard
  grafana:
    image: grafana/grafana:latest
    container_name: devops-grafana
    ports:
      - "3001:3000" # Shifted to 3001 because Metabase uses 3000
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    depends_on:
      - prometheus

  # 4. Artifact Repository
    # 4. Artifact Repository
  jfrog:
    image: releases-docker.jfrog.io/jfrog/artifactory-oss:latest
    container_name: devops-artifactory
    restart: always
    ports:
      - "8084:8082" # UI Port
      - "8085:8081" # API Port
    volumes:
      - jfrog_data:/var/opt/jfrog/artifactory

volumes:
  jenkins_data:
  jfrog_data: # Adding a volume to keep it stable

