services:
  # 1. CI/CD Orchestrator - Fixed Binary URLs
  jenkins:
    image: jenkins/jenkins:lts
    container_name: devops-jenkins
    privileged: true
    user: root
    ports:
      - "8080:8080"
      - "50000:50000"
    volumes:
      - jenkins_data:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock 
    entrypoint: >
      /bin/sh -c "
      set -e;
      apt-get update && 
      apt-get install -y wget unzip ansible ca-certificates curl gnupg lsb-release;

      # Detect Architecture
      ARCH=$$(dpkg --print-architecture);
      OS_CODENAME=$$(lsb_release -cs);

      # 1. Install Docker CLI (Fixed URL & added /linux/debian)
      install -m 0755 -d /etc/apt/keyrings;
      curl -fsSL https://download.docker.com | gpg --batch --yes --dearmor -o /etc/apt/keyrings/docker.gpg;
      chmod a+r /etc/apt/keyrings/docker.gpg;
      echo \"deb [arch=$$ARCH signed-by=/etc/apt/keyrings/docker.gpg] https://download.docker.com $$OS_CODENAME stable\" | tee /etc/apt/sources.list.d/docker.list > /dev/null;
      apt-get update && apt-get install -y docker-ce-cli;

      # 2. Install kubectl (Fixed URL structure)
      curl -LO \"https://dl.k8s.io(curl -L -s https://dl.k8s.io)/bin/linux/$$ARCH/kubectl\";
      install -o root -g root -m 0755 kubectl /usr/local/bin/kubectl;

      # 3. Install Terraform (Fixed direct binary URL)
      wget \"https://releases.hashicorp.com\" -O /tmp/terraform.zip;
      unzip -o /tmp/terraform.zip -d /usr/local/bin/;
      rm /tmp/terraform.zip;

      # 4. Launch Jenkins
      exec /usr/bin/tini -- /usr/local/bin/jenkins.sh
      "

  # 2. Monitoring - Metrics Collector
  prometheus:
    image: prom/prometheus:latest
    container_name: devops-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
    depends_on:
      - node-exporter

  # 3. Monitoring - Hardware Sensor
  node-exporter:
    image: prom/node-exporter:latest
    container_name: devops-node-exporter
    restart: unless-stopped
    ports:
      - "9100:9100"

  # 4. Monitoring - Dashboard
  grafana:
    image: grafana/grafana:latest
    container_name: devops-grafana
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    depends_on:
      - prometheus

  # 5. Artifact Repository
  jfrog:
    image: releases-docker.jfrog.io/jfrog/artifactory-oss:latest
    container_name: devops-artifactory
    restart: always
    ports:
      - "8084:8082" 
      - "8085:8081" 
    volumes:
      - jfrog_data:/var/opt/jfrog/artifactory

volumes:
  jenkins_data:
  jfrog_data: 
