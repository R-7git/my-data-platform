services:
  # 1. CI/CD Orchestrator - Absolute Path Fix
  jenkins:
    image: jenkins/jenkins:lts
    container_name: devops-jenkins
    privileged: true
    user: root
    ports:
      - "8080:8080"
      - "50000:50000"
    volumes:
      - jenkins_data:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock
      - ~/.kube:/root/.kube:ro
    environment:
      - JAVA_OPTS=-Djenkins.install.runSetupWizard=false
    entrypoint: >
      /bin/bash -c "
      # Detect arch and download to /usr/local/bin/
      if [ \"$$(uname -m)\" = \"x86_64\" ]; then ARCH=\"amd64\"; else ARCH=\"arm64\"; fi;
      curl -fsSL \"https://dl.k8s.io\" -o /usr/local/bin/kubectl;
      chmod +x /usr/local/bin/kubectl;
      # Create a symlink to ensure it's in the default path
      ln -s /usr/local/bin/kubectl /usr/bin/kubectl || true;
      exec /usr/bin/tini -- /usr/local/bin/jenkins.sh
      "

  # Monitoring & Artifacts (Remaining services stay the same)
  prometheus:
    image: prom/prometheus:latest
    container_name: devops-prometheus
    ports: [ "9090:9090" ]
    volumes: [ "./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml" ]
    depends_on: [ node-exporter ]

  node-exporter:
    image: prom/node-exporter:latest
    container_name: devops-node-exporter
    restart: unless-stopped
    ports: [ "9100:9100" ]

  grafana:
    image: grafana/grafana:latest
    container_name: devops-grafana
    ports: [ "3001:3000" ]
    environment: [ "GF_SECURITY_ADMIN_PASSWORD=admin" ]
    depends_on: [ prometheus ]

  jfrog:
    image: releases-docker.jfrog.io/jfrog/artifactory-oss:latest
    container_name: devops-artifactory
    restart: always
    ports: [ "8082:8082", "8081:8081" ]
    volumes: [ "jfrog_data:/var/opt/jfrog/artifactory" ]

volumes:
  jenkins_data:
  jfrog_data:
