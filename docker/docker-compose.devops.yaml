services:
  # 1. CI/CD Orchestrator - Jenkins for ARM64
  jenkins:
    image: jenkins/jenkins:lts
    platform: linux/arm64
    container_name: devops-jenkins
    privileged: true
    user: root
    ports:
      - "8080:8080"
      - "50000:50000"
    volumes:
      - jenkins_data:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock
      - ~/.kube:/root/.kube:ro
    environment:
      - JAVA_OPTS=-Djenkins.install.runSetupWizard=false
    entrypoint: >
      /bin/bash -c '
      set -e;
      echo "Detecting container architecture...";
      REAL_ARCH=$(uname -m);
      if [ "$REAL_ARCH" = "x86_64" ]; then TARGET=amd64; else TARGET=arm64; fi;
      echo "Architecture: $REAL_ARCH, downloading kubectl for $TARGET";

      # Install kubectl
      KUBECTL_VERSION=$(curl -L -s https://dl.k8s.io/release/stable.txt);
      curl -Lo /usr/local/bin/kubectl https://dl.k8s.io/release/$KUBECTL_VERSION/bin/linux/$TARGET/kubectl;
      chmod +x /usr/local/bin/kubectl;
      echo "kubectl installed at /usr/local/bin/kubectl";

      # Install Terraform (ARM64)
      TERRAFORM_VERSION=1.5.7;
      wget https://releases.hashicorp.com/terraform/$TERRAFORM_VERSION/terraform_${TERRAFORM_VERSION}_linux_$TARGET.zip -O /tmp/terraform.zip;
      unzip -o /tmp/terraform.zip -d /usr/local/bin/;
      rm /tmp/terraform.zip;
      echo "Terraform $TERRAFORM_VERSION installed";

      # Fix Docker socket permissions
      chmod 666 /var/run/docker.sock;

      exec /usr/bin/tini -- /usr/local/bin/jenkins.sh
      '

  # 2. Monitoring & Exporters
  prometheus:
    image: prom/prometheus:latest
    container_name: devops-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
    depends_on:
      - node-exporter

  node-exporter:
    image: prom/node-exporter:latest
    container_name: devops-node-exporter
    restart: unless-stopped
    ports:
      - "9100:9100"

  grafana:
    image: grafana/grafana:latest
    container_name: devops-grafana
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    depends_on:
      - prometheus

  # 3. Artifact Repository
  jfrog:
    image: releases-docker.jfrog.io/jfrog/artifactory-oss:latest
    container_name: devops-artifactory
    restart: always
    ports:
      - "8082:8082"
      - "8081:8081"
    volumes:
      - jfrog_data:/var/opt/jfrog/artifactory

volumes:
  jenkins_data:
  jfrog_data: