version: '3.8'

services:
  # 1. CI/CD Orchestrator - Configured for Kubernetes & Docker Persistence
  jenkins:
    image: jenkins/jenkins:lts
    container_name: devops-jenkins
    privileged: true
    user: root
    ports:
      - "8080:8080"
      - "50000:50000"
    volumes:
      - jenkins_data:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock 
      # PERSISTENCE FIX: Map your host kubeconfig to Jenkins root
      - ~/.kube:/root/.kube:ro
      # Allow Jenkins to use the host's kubectl binary if not installed in image
      - /usr/local/bin/kubectl:/usr/local/bin/kubectl:ro
    entrypoint: /usr/bin/tini -- /usr/local/bin/jenkins.sh

  # 2. Monitoring - Metrics Collector
  prometheus:
    image: prom/prometheus:latest
    container_name: devops-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
    depends_on:
      - node-exporter

  # 3. Monitoring - Hardware Sensor
  node-exporter:
    image: prom/node-exporter:latest
    container_name: devops-node-exporter
    restart: unless-stopped
    ports:
      - "9100:9100"

  # 4. Monitoring - Dashboard
  grafana:
    image: grafana/grafana:latest
    container_name: devops-grafana
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    depends_on:
      - prometheus

  # 5. Artifact Repository
  jfrog:
    image: releases-docker.jfrog.io/jfrog/artifactory-oss:latest
    container_name: devops-artifactory
    restart: always
    ports:
      - "8082:8082" 
      - "8081:8081" 
    volumes:
      - jfrog_data:/var/opt/jfrog/artifactory

volumes:
  jenkins_data:
  jfrog_data:
