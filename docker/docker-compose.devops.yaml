version: '3.8'

services:
  # 1. CI/CD Orchestrator - Updated with Terraform & Ansible installation
  jenkins:
    image: jenkins/jenkins:lts
    container_name: devops-jenkins
    privileged: true
    user: root
    ports:
      - "8080:8080"
      - "50000:50000"
    volumes:
      - jenkins_data:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock 
    # Install Terraform and Ansible on container start
    entrypoint: >
      /bin/sh -c "
      apt-get update && apt-get install -y wget unzip ansible &&
      wget https://releases.hashicorp.com &&
      unzip terraform_1.7.0_linux_amd64.zip &&
      mv terraform /usr/local/bin/ &&
      rm terraform_1.7.0_linux_amd64.zip &&
      exec /usr/bin/tini -- /usr/local/bin/jenkins.sh
      "

  # 2. Monitoring - Metrics Collector
  prometheus:
    image: prom/prometheus:latest
    container_name: devops-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml

  # 3. Monitoring - Dashboard
  grafana:
    image: grafana/grafana:latest
    container_name: devops-grafana
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    depends_on:
      - prometheus

  # 4. Artifact Repository
  jfrog:
    image: releases-docker.jfrog.io/jfrog/artifactory-oss:latest
    container_name: devops-artifactory
    restart: always
    ports:
      - "8084:8082" 
      - "8085:8081" 
    volumes:
      - jfrog_data:/var/opt/jfrog/artifactory

volumes:
  jenkins_data:
  jfrog_data: 
