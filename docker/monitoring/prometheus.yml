global:
  scrape_interval: 15s # How often to grab data

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'airflow'
    static_configs:
      - targets: ['airflow-webserver:8080'] # Airflow's internal metrics

  - job_name: 'docker-containers'
    static_configs:
      - targets: ['host.docker.internal:9323'] # Requires Docker Desktop 'Metrics' enabled

  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']

