name: 'my_transformation'
version: '1.0.0'
config-version: 2

# This links to the credentials file we will make next
profile: 'snowflake_dbt'

# Where dbt looks for your SQL code
model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

target-path: "target"  # Where compiled SQL goes
clean-targets: ["target", "dbt_packages"]

# Global settings for your models
# ... (rest of file) ...
# ... (Keep everything from the top down to clean-targets) ...

# Global settings for your models
models:
  # This MUST match the 'name:' at the top of this file
  my_transformation:
    # Adding the '+' prefix ensures these are treated as configs, not folders
    +materialized: table
    +snowflake_warehouse: ELT_WH
    
    # Optional: If you have a staging folder, you can specify it here
    staging:
      +materialized: view  # Staging models are usually views for speed


