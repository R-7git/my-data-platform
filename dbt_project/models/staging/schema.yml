version: 2

models:
  - name: stg_customers
    description: "Cleaned customer data with standardized formats."
    columns:
      # Test 1: The Primary Key Rule (Essential)
      - name: customer_id
        description: "Unique identifier for a customer."
        tests:
          - unique:
              config:
                severity: "error"
          - not_null

      # Test 2: The Format Rule
      - name: email
        description: "Customer email address."
        tests:
          - not_null
