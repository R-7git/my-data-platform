apiVersion: apps/v1
kind: Deployment
metadata:
  name: airflow-webserver
spec:
  replicas: 1
  selector:
    matchLabels:
      app: airflow
  template:
    metadata:
      labels:
        app: airflow
    spec:
      # --- NEW: Run Database Migration First ---
      initContainers:
      - name: init-db
        image: rs121093/my-data-platform-airflow:latest
        command: ["airflow"]
        args: ["db", "upgrade"]
        env:
        - name: AIRFLOW__DATABASE__SQL_ALCHEMY_CONN
          value: "postgresql+psycopg2://airflow:airflow@host.docker.internal:5432/airflow"
      # -----------------------------------------
      containers:
      - name: airflow
        image: rs121093/my-data-platform-airflow:latest
        command: ["airflow"]
        args: ["webserver"]
        ports:
        - containerPort: 8080
        env:
        - name: AIRFLOW__CORE__EXECUTOR
          value: "LocalExecutor"
        - name: AIRFLOW__DATABASE__SQL_ALCHEMY_CONN
          value: "postgresql+psycopg2://airflow:airflow@host.docker.internal:5432/airflow"
        - name: AIRFLOW__CORE__LOAD_EXAMPLES
          value: "False"
        - name: AIRFLOW__WEBSERVER__SECRET_KEY
          value: "this_is_a_very_secure_key_for_local_dev"
